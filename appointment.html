<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment | HealthConnect</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f8fb;
    }
    /* Navbar */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #2a9d8f;
      padding: 10px 40px;
      color: white;
    }
    .navbar img {
      width: 45px;
      border-radius: 50%;
      margin-right: 10px;
    }
    .navbar .brand {
      display: flex;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
    }
    .logo-img {
    height: 38px;width: auto; margin-right: 10px;margin-top:15px; border-radius: 12px; object-fit: contain; transform: scale(2.8); transform-origin: center; }
    .navbar .menu-toggle {
      display: none;
    }
    /* Form Section */
    .form-container {
      max-width: 550px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2a9d8f;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      width: 100%;
      background-color: #2a9d8f;
      color: white;
      border: none;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #005f86;
    }
    /* Success Message */
    .success-message {
      display: none;
      text-align: center;
      color: green;
      font-weight: bold;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <div class="navbar">
    <div class="brand">
      <img src="logo.png " alt="HealthConnect Logo" class="logo-img">
      <span>HealthConnect</span>
    </div>
  </div>
  <!-- Appointment Form -->
  <div class="form-container">
    <h2>Patient Appointment Form</h2>
    <form id="appointmentForm">
      <div class="form-group">
        <label>Patient Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" id="mobile" pattern="[0-9]{10}" maxlength="10" required>
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea id="address" rows="2" required></textarea>
      </div>
      <div class="form-group">
        <label>Disease</label>
        <input type="text" id="disease" required>
      </div>
      <div class="form-group">
        <label>Preferred Timing</label>
        <select id="timing" required>
          <option value="">Select Time Slot</option>
          <option>12:00 AM - 3:00 AM</option>
          <option>3:00 AM - 6:00 AM</option>
          <option>6:00 AM - 9:00 AM</option>
          <option>9:00 AM - 12:00 PM</option>
          <option>12:00 PM - 3:00 PM</option>
          <option>3:00 PM - 6:00 PM</option>
          <option>6:00 PM - 9:00 PM</option>
          <option>9:00 PM - 12:00 AM</option>
        </select>
      </div>
      <button type="submit">Submit</button>
    </form>
    <div class="success-message" id="successMsg">
      Slot booked successfully ✅
    </div>
  </div>
  <script>
    const form = document.getElementById('appointmentForm');
    const successMsg = document.getElementById('successMsg');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      successMsg.style.display = 'block';
      form.reset();
      // Redirect back after 2.5 seconds
      setTimeout(() => {
        window.location.href = "web.html";
      }, 2500);
    });
  </script>
</body>
</html>
